<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>다니엘 금식 기도회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --olive:#4a5a2a; --olive-light:#6b7f42; --olive-pale:#e8f0d4;
    --gold:#b8860b; --gold-pale:#fdf3d8; --gold-border:#d4a843;
    --paper:#faf7f0; --parchment:#f0ead8; --border:#d4c9a8;
    --muted:#7a6e5a; --ink:#1a1208;
    --red:#8b2222; --blue:#1a3a8a;
    --radius:10px;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--paper); color:var(--ink);
    font-family:'Noto Sans KR',sans-serif;
    min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom,20px);
  }

  /* ── 헤더 ── */
  .header {
    text-align:center; padding:32px 20px 20px;
    border-bottom:1px solid var(--border);
  }
  .header::before {
    content:'✦'; display:block; font-size:15px;
    color:var(--gold); margin-bottom:10px; letter-spacing:5px;
  }
  .header h1 {
    font-family:'Noto Serif KR',serif; font-size:19px;
    font-weight:700; line-height:1.55; margin-bottom:6px;
  }
  .header .sub { font-size:12px; color:var(--muted); line-height:1.7; }
  .period-badge {
    display:inline-block; margin-top:8px; padding:4px 14px;
    background:var(--gold-pale); border:1px solid var(--gold-border);
    border-radius:20px; font-size:12px; color:var(--gold); font-weight:500;
  }

  /* ── 입력 ── */
  .input-section {
    padding:14px 16px; background:var(--parchment);
    border-bottom:1px solid var(--border);
  }
  .input-row { display:flex; gap:10px; }
  .input-group { flex:1; display:flex; flex-direction:column; gap:4px; }
  .input-group label { font-size:12px; font-weight:500; color:var(--muted); }
  .input-group input,
  .input-group select {
    width:100%; padding:12px; border:1.5px solid var(--border);
    border-radius:var(--radius); font-family:'Noto Sans KR',sans-serif;
    font-size:16px; background:white; color:var(--ink);
    outline:none; -webkit-appearance:none; appearance:none;
  }
  .input-group input:focus,
  .input-group select:focus { border-color:var(--olive-light); }
  .input-group input.error,
  .input-group select.error { border-color:#c0392b; }
  .select-wrap { position:relative; }
  .select-wrap::after {
    content:'▾'; position:absolute; right:12px; top:50%;
    transform:translateY(-50%); color:var(--muted);
    pointer-events:none; font-size:14px;
  }
  .select-wrap select { padding-right:34px; }

  /* ── 주차 블록 ── */
  .schedule-wrap { padding:0 12px; }
  .week-block { margin:16px 0; }
  .week-title {
    font-size:12px; font-weight:600; color:var(--muted);
    letter-spacing:0.05em; padding-bottom:8px;
    border-bottom:1px solid var(--border); margin-bottom:8px;
  }

  /* ── 그리드 ── */
  .grid-table { width:100%; border-collapse:collapse; table-layout:fixed; }
  .grid-table th {
    font-size:11px; font-weight:500; color:var(--muted);
    text-align:center; padding:6px 2px;
    border:1px solid var(--border); background:var(--parchment);
    line-height:1.4; white-space:pre-line;
  }
  .grid-table th.sunday  { color:var(--red);  background:#fdf0f0; }
  .grid-table th.saturday{ color:var(--blue); background:#f0f4fd; }
  .lbl-col { width:36px; }
  .grid-table td.meal-label {
    font-size:11px; color:var(--muted); text-align:center;
    padding:0; border:none; background:transparent;
    vertical-align:middle; line-height:1.3; white-space:pre-line;
  }
  .grid-table td.slot {
    border:1px solid var(--border); text-align:center;
    padding:0; height:48px; cursor:pointer; background:white;
    transition:background 0.1s;
  }
  .grid-table td.slot:active { background:#f0f5e8; }
  .grid-table td.slot.selected {
    background:var(--olive-pale); border-color:var(--olive);
  }
  .slot-inner {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; color:var(--olive); pointer-events:none;
  }

  /* ── 선택 현황 ── */
  .summary {
    margin:12px; padding:14px 16px;
    background:var(--parchment); border:1px solid var(--border);
    border-radius:var(--radius);
  }
  .summary-title { font-size:13px; font-weight:500; color:var(--ink); margin-bottom:10px; }
  .summary-counts { display:flex; }
  .count-item { flex:1; text-align:center; }
  .count-item + .count-item { border-left:1px solid var(--border); }
  .count-num {
    font-family:'Noto Serif KR',serif; font-size:26px;
    font-weight:700; color:var(--olive); line-height:1;
  }
  .count-label { font-size:11px; color:var(--muted); margin-top:3px; }

  /* ── 버튼 ── */
  .actions { display:flex; gap:10px; padding:0 12px 16px; }
  .btn {
    padding:14px 18px; border-radius:var(--radius);
    font-family:'Noto Sans KR',sans-serif; font-size:15px;
    font-weight:500; cursor:pointer;
    border:1.5px solid var(--border); background:white; color:var(--ink);
    min-height:50px; transition:background 0.1s;
  }
  .btn:active { background:var(--parchment); }
  .btn-primary {
    flex:1; background:var(--olive);
    border-color:var(--olive); color:white;
  }
  .btn-primary:active  { background:var(--olive-light); }
  .btn-primary:disabled{ background:var(--border); border-color:var(--border); }

  /* ── 토스트 ── */
  .toast {
    position:fixed;
    bottom:calc(20px + env(safe-area-inset-bottom,0px));
    left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--ink); color:white;
    padding:12px 22px; border-radius:30px; font-size:14px;
    transition:transform 0.25s ease; z-index:999;
    white-space:nowrap; pointer-events:none;
    max-width:92vw; text-align:center;
  }
  .toast.show   { transform:translateX(-50%) translateY(0); }
  .toast.success{ background:var(--olive); }
  .toast.error  { background:#8b2222; }

  /* ── 로딩 ── */
  .loading-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(250,247,240,0.9); z-index:100;
    align-items:center; justify-content:center;
    flex-direction:column; gap:14px;
  }
  .loading-overlay.show { display:flex; }
  .spinner {
    width:36px; height:36px;
    border:3px solid var(--border); border-top-color:var(--olive);
    border-radius:50%; animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<header class="header">
  <h1>제 349회 국제전도폭발<br>한국지도자 임상훈련</h1>
  <p class="sub">2026.06.08 ~ 06.12 </p>
  <span class="period-badge">다니엘 금식기도 기간 5/17 ~ 6/6</span>
</header>

<div class="input-section">
  <div class="input-row">
    <div class="input-group">
      <label>이름 <span style="color:#c0392b">*</span></label>
      <input type="text" id="nameInput" placeholder="성함"
        maxlength="20" autocomplete="off"
        autocorrect="off" autocapitalize="none" spellcheck="false"/>
    </div>
    <div class="input-group">
      <label>반명 <span style="color:#c0392b">*</span></label>
      <div class="select-wrap">
        <select id="classInput">
          <option value="">-- 선택 --</option>
          <option value="수주반">수주반</option>
          <option value="분주반">분주반</option>
          <option value="화요반">화요반</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="schedule-wrap" id="scheduleArea"></div>

<div class="summary">
  <p class="summary-title">선택 현황</p>
  <div class="summary-counts">
    <div class="count-item">
      <div class="count-num" id="cTotal">0</div>
      <div class="count-label">총 선택</div>
    </div>
    <div class="count-item">
      <div class="count-num" id="cMorning">0</div>
      <div class="count-label">아  침</div>
    </div>
    <div class="count-item">
      <div class="count-num" id="cLunch">0</div>
      <div class="count-label">점  심</div>
    </div>
    <div class="count-item">
      <div class="count-num" id="cEvening">0</div>
      <div class="count-label">저  녁</div>
    </div>
  </div>
</div>

<div class="actions">
  <button class="btn" onclick="clearAll()">초기화</button>
  <button class="btn btn-primary" id="submitBtn" onclick="submitToSheet()">
    구글 시트에 제출하기
  </button>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p style="font-size:13px;color:var(--muted)">제출 중...</p>
</div>
<div class="toast" id="toast"></div>

<script>
// =============================================
// ★ 여기에 Apps Script 배포 URL을 입력하세요 ★
// =============================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNGefgo58IK8DZYK2Bnl8Cb1ibmzpur24-p0UHZ9_52CnYtdHKf1-24K1z9RnMYfpx/exec";
// =============================================

const WEEKS = [
  { label:"1주차 (5/17 ~ 5/23)", dates:[
    {label:"5/17\n주일", key:"0517", type:"sunday"},
    {label:"5/18\n월",   key:"0518"},
    {label:"5/19\n화",   key:"0519"},
    {label:"5/20\n수",   key:"0520"},
    {label:"5/21\n목",   key:"0521"},
    {label:"5/22\n금",   key:"0522"},
    {label:"5/23\n토",   key:"0523", type:"saturday"},
  ]},
  { label:"2주차 (5/24 ~ 5/30)", dates:[
    {label:"5/24\n주일", key:"0524", type:"sunday"},
    {label:"5/25\n월",   key:"0525"},
    {label:"5/26\n화",   key:"0526"},
    {label:"5/27\n수",   key:"0527"},
    {label:"5/28\n목",   key:"0528"},
    {label:"5/29\n금",   key:"0529"},
    {label:"5/30\n토",   key:"0530", type:"saturday"},
  ]},
  { label:"3주차 (5/31 ~ 6/6)", dates:[
    {label:"5/31\n주일", key:"0531", type:"sunday"},
    {label:"6/1\n월",    key:"0601"},
    {label:"6/2\n화",    key:"0602"},
    {label:"6/3\n수",    key:"0603"},
    {label:"6/4\n목",    key:"0604"},
    {label:"6/5\n금",    key:"0605"},
    {label:"6/6\n토",    key:"0606", type:"saturday"},
  ]},
];

const MEALS = [
  {key:"morning", label:"아\n침"},
  {key:"lunch",   label:"점\n심"},
  {key:"evening", label:"저\n녁"},
];

const sel = {};

function buildSchedule() {
  const area = document.getElementById("scheduleArea");
  area.innerHTML = "";

  WEEKS.forEach(week => {
    const block = document.createElement("div");
    block.className = "week-block";

    const title = document.createElement("div");
    title.className = "week-title";
    title.textContent = week.label;
    block.appendChild(title);

    const table = document.createElement("table");
    table.className = "grid-table";

    // 헤더
    const thead = document.createElement("thead");
    const hrow  = document.createElement("tr");
    const thEmpty = document.createElement("th");
    thEmpty.className = "lbl-col";
    hrow.appendChild(thEmpty);
    week.dates.forEach(d => {
      const th = document.createElement("th");
      if (d.type) th.className = d.type;
      th.style.whiteSpace = "pre-line";
      th.textContent = d.label;
      hrow.appendChild(th);
    });
    thead.appendChild(hrow);
    table.appendChild(thead);

    // 바디
    const tbody = document.createElement("tbody");
    MEALS.forEach(meal => {
      const tr = document.createElement("tr");
      const tdLabel = document.createElement("td");
      tdLabel.className = "meal-label";
      tdLabel.style.whiteSpace = "pre-line";
      tdLabel.textContent = meal.label;
      tr.appendChild(tdLabel);

      week.dates.forEach(d => {
        const key = d.key + "_" + meal.key;
        const td  = document.createElement("td");
        td.className = "slot" + (sel[key] ? " selected" : "");
        td.onclick = () => toggle(td, key);
        const inner = document.createElement("div");
        inner.className = "slot-inner";
        inner.textContent = sel[key] ? "✓" : "";
        td.appendChild(inner);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    block.appendChild(table);
    area.appendChild(block);
  });

  updateSummary();
}

function toggle(td, key) {
  sel[key] = !sel[key];
  td.classList.toggle("selected", sel[key]);
  td.querySelector(".slot-inner").textContent = sel[key] ? "✓" : "";
  updateSummary();
}

function updateSummary() {
  let total = 0, morning = 0, lunch = 0, evening = 0;
  Object.keys(sel).forEach(k => {
    if (!sel[k]) return;
    total++;
    if (k.endsWith("_morning")) morning++;
    if (k.endsWith("_lunch"))   lunch++;
    if (k.endsWith("_evening")) evening++;
  });
  document.getElementById("cTotal").textContent   = total;
  document.getElementById("cMorning").textContent = morning;
  document.getElementById("cLunch").textContent   = lunch;
  document.getElementById("cEvening").textContent = evening;
}

function clearAll() {
  Object.keys(sel).forEach(k => delete sel[k]);
  buildSchedule();
}

async function submitToSheet() {
  const name      = document.getElementById("nameInput").value.trim();
  const className = document.getElementById("classInput").value;

  if (!name) {
    document.getElementById("nameInput").classList.add("error");
    showToast("이름을 입력해 주세요", "error");
    document.getElementById("nameInput").focus();
    return;
  }
  document.getElementById("nameInput").classList.remove("error");

  if (!className) {
    document.getElementById("classInput").classList.add("error");
    showToast("반명을 선택해 주세요", "error");
    return;
  }
  document.getElementById("classInput").classList.remove("error");

  if (Object.values(sel).filter(Boolean).length === 0) {
    showToast("기도 시간대를 한 개 이상 선택해 주세요", "error");
    return;
  }

  if (SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
    showToast("⚠️ Apps Script URL을 설정해 주세요", "error");
    return;
  }

  const fullName   = name + " (" + className + ")";
  const selections = {};
  WEEKS.flatMap(w => w.dates).forEach(d =>
    MEALS.forEach(m => {
      selections[d.key + "_" + m.key] = sel[d.key + "_" + m.key] ? "O" : "";
    })
  );

  document.getElementById("loadingOverlay").classList.add("show");
  document.getElementById("submitBtn").disabled = true;

  try {
    const res    = await fetch(SCRIPT_URL, {
      method: "POST",
      body:   JSON.stringify({
        name:      fullName,
        timestamp: new Date().toLocaleString("ko-KR"),
        selections
      })
    });
    const result = await res.json();
    if (result.status === "ok") {
      showToast("✓ 구글 시트에 저장되었습니다!", "success");
      setTimeout(() => {
        clearAll();
        document.getElementById("nameInput").value  = "";
        document.getElementById("classInput").value = "";
      }, 1500);
    } else {
      showToast("오류: " + (result.message || "다시 시도해 주세요"), "error");
    }
  } catch (e) {
    showToast("네트워크 오류. 다시 시도해 주세요.", "error");
  } finally {
    document.getElementById("loadingOverlay").classList.remove("show");
    document.getElementById("submitBtn").disabled = false;
  }
}

function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className   = "toast show " + type;
  setTimeout(() => { t.className = "toast"; }, 3500);
}

// 초기 실행
buildSchedule();
</script>
</body>
</html>
